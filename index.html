<script>
const apiBase = window.location.origin;
let currentResults = [];
let currentUser = null;

function setText(id, value) {
  document.getElementById(id).textContent = value ?? "0";
}

async function jsonFetch(url, options = {}) {
  const response = await fetch(url, { credentials: "same-origin", ...options });
  if (!response.ok) throw new Error("Error");
  return response.json();
}

// =========================
// 🔍 BUSCAR
// =========================
async function buscar() {
  const query = document.getElementById("search").value.trim();
  const tipoEntorno = document.getElementById("tipoEntornoFilter").value;
  const status = document.getElementById("statusFilter").value;

  if (!query) return;

  const data = await jsonFetch(
    `${apiBase}/vms?q=${query}&tipo_entorno=${tipoEntorno}&status=${status}`
  );

  currentResults = data;

  renderMainTable(data);
  setText("totalResultados", data.length);

  document.getElementById("resultsInfo").textContent =
    `Se encontraron ${data.length} registros`;

  await refreshSearchDashboard(query, tipoEntorno, status);

  if (!query.includes(",")) {
    try {
      const audit = await jsonFetch(
        `${apiBase}/ticket-audit?ticket=${encodeURIComponent(query)}&tipo_entorno=${tipoEntorno}`
      );
      renderTicketAudit(audit);
    } catch {
      renderTicketAudit(null);
    }
  } else {
    renderTicketAudit(null);
  }

  setSearchSectionVisible(true);
}

// =========================
// 🧹 LIMPIAR
// =========================
function limpiar() {
  document.getElementById("search").value = "";

  currentResults = [];
  renderMainTable([]);

  setText("totalResultados", 0);
  document.getElementById("resultsInfo").textContent = "";

  renderTickets([]);
  renderAreas([]);
  renderCentros([]);
  renderPivotTable([]);

  setSearchSectionVisible(false);
}

// =========================
// 📊 DASHBOARD
// =========================
async function refreshSearchDashboard(query, tipoEntorno, status) {
  const params = new URLSearchParams({ q: query, tipo_entorno: tipoEntorno, status });

  const dashboard = await jsonFetch(
    `${apiBase}/search-dashboard?${params.toString()}`
  );

  const pivot = await jsonFetch(
    `${apiBase}/search-pivot?${params.toString()}`
  );

  renderAreas(dashboard.por_area || []);
  renderCentros(dashboard.por_centro_costo || []);
  renderTickets(dashboard.por_ticket || []);
  renderPivotTable(pivot || []);
}

// =========================
// 🧩 RENDERS
// =========================
function renderMainTable(data) {
  const table = document.getElementById("tablaResultados");
  if (!data.length) {
    table.innerHTML = `<tr><td class="empty">Sin resultados</td></tr>`;
    return;
  }

  table.innerHTML = `
    <tr>
      <th>DNI</th><th>IP</th><th>Hostname</th><th>Ticket</th>
    </tr>
    ${data.map(d => `
      <tr>
        <td>${d.dni || "-"}</td>
        <td>${d.ip || "-"}</td>
        <td>${d.hostname || "-"}</td>
        <td>${d.ticket || "-"}</td>
      </tr>
    `).join("")}
  `;
}

function renderTickets(items) {
  const table = document.getElementById("tablaTickets");

  if (!items.length) {
    table.innerHTML = `<tr><td class="empty">Sin tickets</td></tr>`;
    return;
  }

  table.innerHTML = `
    <tr>
      <th>Ticket</th><th>Solicitudes</th><th>Activos</th><th>Cesados</th>
    </tr>
    ${items.map(i => `
      <tr>
        <td>${i.ticket}</td>
        <td>${i.solicitudes}</td>
        <td>${i.activos}</td>
        <td>${i.cesados}</td>
      </tr>
    `).join("")}
  `;
}

function renderAreas() {}
function renderCentros() {}
function renderPivotTable() {}
function renderTicketAudit() {}

function setSearchSectionVisible(v) {
  document.getElementById("searchResultsSection").classList.toggle("hidden", !v);
}

// =========================
// 🚀 INIT
// =========================
document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") buscar();
});
</script>
