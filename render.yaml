services:
  - type: web
    name: inventario-vms
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: LOGIN_OTP_ENABLED
        value: "false"
    disks:
      - name: inventario-vms-data
        mountPath: /var/data
        sizeGB: 1
